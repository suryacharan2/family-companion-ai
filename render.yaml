# render.yaml
services:
  - type: web
    name: family-companion-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        fromSecret: OPENAI_API_KEY
      - key: DATABASE_URL
        fromSecret: DATABASE_URL

  - type: web
    name: family-companion-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: serve -s frontend/dist -l $PORT
    autoDeploy: true